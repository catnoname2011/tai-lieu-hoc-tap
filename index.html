<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>System Breach</title>

<style>
body {
    background: black;
    color: lime;
    font-family: monospace;
    padding: 20px;
    overflow: hidden;
}

/* vùng hiển thị log */
#text {
    height: 75vh;
    overflow-y: auto;
}

/* thanh loading */
#progress {
    width: 100%;
    height: 20px;
    background: #111;
    margin-top: 10px;
}
#bar {
    height: 100%;
    width: 0%;
    background: red;
}

/* popup */
.popup {
    position: fixed;
    background: black;
    color: red;
    border: 1px solid red;
    padding: 10px;
    font-size: 14px;
}
</style>
</head>

<body>

<div id="text">[SYSTEM] Starting...<br></div>

<div id="progress"><div id="bar"></div></div>

<script>
window.onload = function() {

    let textDiv = document.getElementById("text");
    let bar = document.getElementById("bar");

    // ===== 1. LOG CHẠY =====
    let logInterval = setInterval(() => {
        let rand = Math.floor(Math.random() * 9999);
        textDiv.innerHTML += "[LOG] Access file_" + rand + ".sys ... OK<br>";
        textDiv.scrollTop = textDiv.scrollHeight;
    }, 50);

    // ===== 2. PROGRESS =====
    let progress = 0;
    let load = setInterval(() => {
        progress += Math.random() * 3;
        bar.style.width = progress + "%";

        if(progress >= 100) {
            clearInterval(load);
            clearInterval(logInterval);

            textDiv.innerHTML += "<br>💀 SYSTEM COMPROMISED 💀<br>";
            textDiv.innerHTML += "//////////////////////////////////";
        }
    }, 100);

    // ===== 3. NHẤP NHÁY =====
    setInterval(() => {
        document.body.style.background =
            document.body.style.background === "black" ? "#200000" : "black";
    }, 300);

    // ===== 4. POPUP =====
    function popup() {
        let div = document.createElement("div");
        div.className = "popup";
        div.innerHTML = "⚠ Virus detected!";
        div.style.top = Math.random() * window.innerHeight + "px";
        div.style.left = Math.random() * window.innerWidth + "px";
        document.body.appendChild(div);

        setTimeout(() => div.remove(), 1500);
    }
    setInterval(popup, 800);

    // ===== 5. CHẶN THOÁT KHI CHƯA XONG =====
    let running = true;
    window.onbeforeunload = function() {
        if(running) return "Đang xử lý, không thể thoát 😈";
    };

    // mở khóa khi xong
    setTimeout(() => {
        running = false;
    }, 8000);
};
</script>

</body>
</html>
